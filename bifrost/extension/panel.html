<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bifrost Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mono: "SF Mono", "Fira Code", "Consolas", monospace;

  /* dark */
  --bg:       #1a1a1a;
  --surface:  #242424;
  --surface2: #2e2e2e;
  --border:   #3a3a3a;
  --dim:      #6b6b6b;
  --text:     #e8e8e8;
  --muted:    #9a9a9a;
  --accent:   #da7756;
  --accent-d: #c0603e;
  --ok:       #4a9e4a;
  --err:      #c96060;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg:       #ffffff;
    --surface:  #f5f5f5;
    --surface2: #ebebeb;
    --border:   #d8d8d8;
    --dim:      #8a8a8a;
    --text:     #1a1a1a;
    --muted:    #555555;
    --accent:   #c96440;
    --accent-d: #a84e2e;
    --ok:       #2e7d2e;
    --err:      #b52a2a;
  }
}

html, body {
  height: 100%;
  width: 100%;
}

body {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.brand {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .5px;
}

#toolbar label { color: var(--dim); font-size: 11px; white-space: nowrap; }

#toolbar input, #toolbar select {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 7px;
  border-radius: 4px;
  outline: none;
  transition: border-color .15s;
}
#toolbar input:focus, #toolbar select:focus { border-color: var(--accent); }
#url-input    { width: 200px; }
#key-input    { width: 140px; }
#search-input { width: 160px; }

#search-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
  transition: background .2s;
}
#search-dot.on { background: #3a3; }

#status {
  margin-left: auto;
  font-size: 11px;
  color: var(--dim);
  transition: color .2s;
  white-space: nowrap;
}
#status.ok   { color: var(--ok); }
#status.err  { color: var(--err); }
#status.busy { color: var(--muted); }

#clear, #read-page, #tldr, #codesec, #sbom, #compliance {
  font-family: var(--mono);
  font-size: 11px;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}
#clear:hover      { color: var(--err);    border-color: var(--err); }
#read-page:hover  { color: var(--accent); border-color: var(--accent); }
#read-page.active { color: var(--ok);     border-color: var(--ok); }
#tldr:hover       { color: var(--accent); border-color: var(--accent); }
#codesec:hover    { color: #e07020;       border-color: #e07020; }
#codesec.busy     { color: var(--muted);  border-color: var(--border); cursor: wait; }
#sbom:hover       { color: var(--accent); border-color: var(--accent); }
#sbom.busy        { color: var(--muted);  border-color: var(--border); cursor: wait; }
#compliance:hover { color: var(--ok);     border-color: var(--ok); }
#compliance.busy  { color: var(--muted);  border-color: var(--border); cursor: wait; }

/* ── CodeSec results drawer ── */
#codesec-panel {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border-top: 2px solid #e07020;
  flex-shrink: 0;
  max-height: 280px;
  overflow-y: auto;
  font-size: 11px;
}
#codesec-panel.open { display: flex; }
#codesec-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  color: #e07020;
  font-size: 11px;
  flex-shrink: 0;
}
#codesec-header .cs-close {
  margin-left: auto;
  cursor: pointer;
  color: var(--dim);
  font-size: 12px;
  line-height: 1;
}
#codesec-header .cs-close:hover { color: var(--err); }
#codesec-body { padding: 8px 12px; }
.cs-section-title {
  color: var(--muted);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 8px 0 4px;
}
.cs-section-title:first-child { margin-top: 0; }
.cs-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 4px 8px;
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.45;
}
.cs-row:last-child { border-bottom: none; }
.cs-sev {
  font-weight: 700;
  text-transform: uppercase;
  font-size: 10px;
}
.cs-sev.critical { color: #d03030; }
.cs-sev.high     { color: #d06020; }
.cs-sev.medium   { color: #c0a020; }
.cs-sev.low      { color: var(--muted); }
.cs-detail { color: var(--text); }
.cs-detail .cs-sub { color: var(--muted); font-size: 10px; }
.cs-empty { color: var(--ok); padding: 4px 0; }
.cs-sbom-actions { display: flex; gap: 8px; padding: 4px 0 2px; }
.cs-sbom-btn {
  font-family: var(--mono);
  font-size: 10px;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
}
.cs-sbom-btn:hover { border-color: var(--accent); }

/* ── Compliance panel ── */
#compliance-panel {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border-top: 2px solid var(--ok);
  flex-shrink: 0;
}
#compliance-panel.open { display: flex; }
#compliance-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-weight: 700;
  color: var(--ok);
  font-size: 11px;
  flex-shrink: 0;
}
#compliance-header .cs-close { margin-left: auto; cursor: pointer; color: var(--dim); font-size: 12px; }
#compliance-header .cs-close:hover { color: var(--err); }
#compliance-body {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  font-size: 11px;
}
#compliance-body select, #compliance-body input[type="text"] {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 7px;
  border-radius: 4px;
  outline: none;
}
#compliance-body select:focus, #compliance-body input[type="text"]:focus { border-color: var(--ok); }
#comp-report    { flex: 1; min-width: 180px; }
#comp-generate {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--ok);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
}
#comp-generate:hover   { filter: brightness(1.1); }
#comp-generate:disabled { opacity: .4; cursor: wait; }
#comp-status { font-size: 10px; color: var(--muted); }
#comp-status.ok  { color: var(--ok); }
#comp-status.err { color: var(--err); }

/* ── Messages ── */
#log {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
#log::-webkit-scrollbar { width: 4px; }
#log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.turn {
  display: flex;
  gap: 0;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  line-height: 1.6;
  animation: in .12s ease;
}
@keyframes in { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
.turn:last-child { border-bottom: none; }

.role {
  width: 64px;
  flex-shrink: 0;
  font-size: 11px;
  padding-top: 1px;
  user-select: none;
}
.role.user   { color: var(--accent); }
.role.ai     { color: var(--muted); }
.role.system { color: var(--err); }

.content {
  flex: 1;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  color: var(--text);
}
.content code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--surface2);
  color: #e0b98a;
  padding: 1px 5px;
  border-radius: 3px;
}
.content pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 10px 12px;
  overflow-x: auto;
  margin: 6px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
}
.content pre code { background: none; padding: 0; color: var(--text); }
.content a.ext-link {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
.content a.ext-link:hover { color: var(--accent-d); }

.cursor {
  display: inline-block;
  width: 7px; height: 13px;
  background: var(--accent);
  vertical-align: text-bottom;
  border-radius: 1px;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input ── */
#input-row {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#prompt {
  flex: 1;
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 12px;
  border: none;
  outline: none;
  resize: none;
  min-height: 42px;
  max-height: 180px;
  background: transparent;
  color: var(--text);
  line-height: 1.55;
}
#prompt::placeholder { color: var(--dim); }
#send {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-left: 1px solid var(--border);
  padding: 0 18px;
  cursor: pointer;
  white-space: nowrap;
  font-weight: 600;
  transition: background .15s;
}
#send:hover:not(:disabled) { background: var(--accent-d); }
#send:disabled { opacity: .35; cursor: not-allowed; }

/* ── Footer ── */
#hint {
  padding: 4px 12px;
  font-size: 10px;
  color: var(--dim);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="brand">⚡ bifrost</span>
  <label>url</label>
  <input id="url-input" type="url" placeholder="https://bifrost.xxx" autocomplete="off" />
  <label>key</label>
  <input id="key-input" type="password" placeholder="sk-bf-…" autocomplete="off" />
  <label>model</label>
  <select id="model">
    <option value="claude-haiku-4-5" selected>haiku-4-5 ⚡</option>
    <option value="claude-sonnet-4-6">sonnet-4-6</option>
    <option value="claude-opus-4-8">opus-4-8</option>
    <option value="deepseek-v4-flash">deepseek-v4-flash ⚡</option>
    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
  </select>
  <input id="search-input" type="hidden" />
  <span id="search-dot" style="display:none"></span>
  <button id="read-page" title="Read current page into context">📄 Read Web Page</button>
  <button id="tldr" title="Summarize current page">TL;DR</button>
  <button id="codesec" title="Run FortiCNAPP SCA + SAST scan on code in this page">🛡 CodeSec</button>
  <button id="sbom" title="SBOM export (coming soon)" disabled style="display:none">📦 SBOM</button>
  <button id="compliance" title="Generate FortiCNAPP compliance PDF report">📋 Compliance</button>
  <button id="clear">clear</button>
  <span id="status">—</span>
</div>

<div id="codesec-panel">
  <div id="codesec-header">
    <span id="codesec-panel-title">🛡 FortiCNAPP CodeSec</span>
    <span class="cs-close" id="codesec-close">✕</span>
  </div>
  <div id="codesec-body"></div>
</div>

<div id="compliance-panel">
  <div id="compliance-header">
    <span>📋 FortiCNAPP Compliance Report</span>
    <span class="cs-close" id="compliance-close">✕</span>
  </div>
  <div id="compliance-body">
    <select id="comp-report" style="flex:1;min-width:180px"><option value="">Loading reports…</option></select>
    <button id="comp-generate">⬇ Generate PDF</button>
    <span id="comp-status"></span>
  </div>
</div>

<div id="log"></div>

<div id="input-row">
  <textarea id="prompt" placeholder="message… (Enter to send)" rows="1"></textarea>
  <button id="send">send</button>
</div>

<div id="hint">
  <span>shift+enter: newline</span>
  <span id="token-info"></span>
</div>

<script src="panel.js"></script>
</body>
</html>
